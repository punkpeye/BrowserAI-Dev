[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "browseai"
version = "0.1.0"
description = "Python SDK for BrowseAI Dev — reliable research infrastructure for AI agents"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "BrowseAI Dev" }]
keywords = ["ai", "research", "search", "agents", "mcp", "langchain", "crewai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.scripts]
browseai = "browseai.cli:main"

[project.optional-dependencies]
langchain = ["langchain-core>=0.2.0"]
crewai = ["crewai>=0.41.0"]

[project.urls]
Homepage = "https://browseai.dev"
Documentation = "https://browseai.dev/developers"
Repository = "https://github.com/EiffelHack/BrowserAI-Dev"
