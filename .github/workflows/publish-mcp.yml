name: Publish MCP Package

on:
  push:
    branches: [main]
    paths:
      - 'apps/mcp/**'
      - '!apps/mcp/**/*.md'

jobs:
  publish:
    name: Build & Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Build MCP package
        run: pnpm --filter browse-ai build
      - name: Check version against npm
        id: version
        working-directory: apps/mcp
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view browse-ai version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "Version unchanged ($CURRENT), skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing: $PUBLISHED -> $CURRENT"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Publish to npm
        if: steps.version.outputs.skip != 'true'
        working-directory: apps/mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
