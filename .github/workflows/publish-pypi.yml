name: Publish Python SDK

on:
  push:
    branches: [main]
    paths:
      - 'packages/python-sdk/**'
      - '!packages/python-sdk/**/*.md'

jobs:
  publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build twine
      - name: Check version against PyPI
        id: version
        working-directory: packages/python-sdk
        run: |
          CURRENT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PUBLISHED=$(python -c "import urllib.request, json; data=json.loads(urllib.request.urlopen('https://pypi.org/pypi/browseai/json').read()); print(data['info']['version'])" 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "Version unchanged ($CURRENT), skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing: $PUBLISHED -> $CURRENT"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Build package
        if: steps.version.outputs.skip != 'true'
        working-directory: packages/python-sdk
        run: python -m build
      - name: Publish to PyPI
        if: steps.version.outputs.skip != 'true'
        working-directory: packages/python-sdk
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
